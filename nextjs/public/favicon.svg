<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0f0f1e"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rocket shape -->
  <g transform="translate(100, 100)">
    <!-- Rocket body -->
    <circle cx="0" cy="-10" r="25" fill="url(#grad1)"/>
    
    <!-- Rocket nose cone -->
    <polygon points="0,-35 -15,-20 15,-20" fill="#ff006e"/>
    
    <!-- Rocket windows -->
    <circle cx="-8" cy="-10" r="3" fill="#ffffff"/>
    <circle cx="8" cy="-10" r="3" fill="#ffffff"/>
    <circle cx="0" cy="5" r="3" fill="#ffffff"/>
    
    <!-- Rocket fins left -->
    <polygon points="-25,10 -35,25 -20,30" fill="url(#grad1)"/>
    
    <!-- Rocket fins right -->
    <polygon points="25,10 35,25 20,30" fill="url(#grad1)"/>
    
    <!-- Rocket flame -->
    <polygon points="-10,35 0,50 10,35 5,40 0,45 -5,40" fill="#ff006e"/>
    <polygon points="-5,38 0,48 5,38 2,42 0,45 -2,42" fill="#ffff00"/>
  </g>
</svg>
